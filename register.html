<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Register</title>
    <style>
        .banner p{
            margin-top: 15px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }
        .form h2{
            margin-bottom: 40px;
        }
        #pi, #fi, #ld{
            background-color: honeydew;
            width: 400px;
            margin: 20px auto;
            padding: 25px;
            border-radius: 8px;
            text-align: left;
        }
        #pi h3, #fi h3, #ld h3{
            margin-bottom: 15px;
        }
        input, select, textarea{
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid lightgray;
            border-radius: 4px;
        }
        textarea{
            height: 70px;
            resize: none;
        }
        button{
            display: block;
            margin: 30px auto 60px auto;
            padding: 12px 30px;
            background-color: rgb(37, 138, 37);
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover{
            background-color: darkgreen;
        }
    </style>
</head>
<body>
    <!-- Home -->
    <header>
        <h1>AgroConnect</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="market.html">Market</a>
            <a href="schemes.html">Schemes</a>
            <a href="profile.html">Profile</a>
        </nav>
    </header>

    <!-- Banner -->
    <section class="banner">
        <h1>Farmer Registration</h1>
        <p>Join AgroConnect and connect directly with 
        buyers, access government schemes, and stay 
        updated with market prices.</p>
    </section>

    <!-- Form -->
    <section class="form">
        <h2>Create Your Account</h2>
        <div id="pi">
            <h3>Personal Information</h3>
            <form action="">
                <label for="">Full Name:</label>
                <input type="text" required><br><br>
                <label for="">Email:</label>
                <input type="email"><br><br>
                <label for="">Phone:</label>
                <input type="number" required><br><br>
                <label for="">Password</label>
                <input type="password" required><br><br>
            </form>
        </div>
        <div id="fi">
            <h3>Farm Information</h3>
            <form action="">
                <label for="">Primary Crop:</label>
                <input type="text" required><br><br>
                <label for="">Secondary Crop:</label>
                <input type="text"><br><br>
                <label for="">Land Size (in Acres):</label>
                <input type="number"><br><br>
                <label for="">Farming Experience (in Years):</label>
                <input type="number"><br><br>
                <label for="">Irrigation Type:</label>
                <select name="" id="">
                    <option value="">Drip Irrigation</option>
                    <option value="">Sprinkler System</option>
                    <option value="">Canal Irrigation</option>
                    <option value="">Rain-fed</option>
                </select>
            </form>
        </div>
        <div id="ld">
            <h3>Location Details</h3>
            <form action="">
                <label for="">State: </label>
                <input type="text"><br><br>
                <label for="">District: </label>
                <input type="text"><br><br>
                <label for="">Village: </label>
                <input type="text"><br><br>
                <label for="">Full Address: </label>
                <textarea name="" id=""></textarea>
            </form>
        </div>
    </section>
    <button type="submit">Submit</button>
</body>
</html>
